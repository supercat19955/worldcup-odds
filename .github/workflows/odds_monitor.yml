name: World Cup Odds Monitor

# 世界杯比分赔率云端监控
# 每 10 分钟自动: 抓取赔率 → 刷新情报 → 分析趋势 → 生成报告 → 发布网页

on:
  schedule:
    # 每10分钟执行一次 (UTC时间)
    - cron: '*/10 * * * *'
  # 也可以手动触发
  workflow_dispatch:

# 权限: 允许推送代码 + 发布 GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# 确保同一时间只有一个实例在运行
concurrency:
  group: odds-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout 代码仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 完整历史, 用于趋势对比

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 运行赔率监控
        run: python main.py
        timeout-minutes: 5

      - name: 提交数据更新
        if: success()
        run: |
          git config user.name "Odds Monitor Bot"
          git config user.email "bot@odds.monitor"
          git add data/snapshots/ data/match_intel.json data/intel_history/ output/worldcup_score_odds.html
          if git diff --staged --quiet; then
            echo "✅ 赔率无变化，跳过提交"
          else
            git commit -m "🔄 自动更新: 赔率快照 & 分析报告 [$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')]"
            git push origin main
            echo "✅ 数据已提交并推送"
          fi

      - name: 发布到 GitHub Pages
        if: success()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          destination_dir: .
          keep_files: false
          commit_message: "🌐 自动发布赔率报告"
