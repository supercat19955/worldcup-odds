name: World Cup Odds Monitor

# 世界杯比分赔率云端监控 - 每30分钟自动运行
# GitHub 自带 schedule + 手动触发双模式
# 可选: 在仓库 Settings > Secrets 设置 AI_API_KEY 启用大模型分析

on:
  schedule:
    - cron: '7,37 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: odds-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行赔率监控
        run: python main.py
        timeout-minutes: 5
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}

      - name: 提交数据快照
        if: success()
        run: |
          git config user.name "World Cup Odds Bot"
          git config user.email "odds@worldcup.monitor"
          git add data/snapshots/ data/match_intel.json data/intel_history/
          if git diff --staged --quiet; then
            echo "数据无变化，跳过提交"
          else
            git commit -m "自动更新: 赔率快照 [$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')]"
            git pull --rebase origin main || (git rebase --abort 2>/dev/null; git pull --no-rebase origin main)
            git push origin main || echo "推送失败，下次重试"
            echo "数据已提交并推送"
          fi

      - name: 配置 Pages
        uses: actions/configure-pages@v4

      - name: 上传产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./output

      - name: 部署
        id: deployment
        uses: actions/deploy-pages@v4
