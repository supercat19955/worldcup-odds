name: World Cup Odds Monitor

# 世界杯比分赔率云端监控
# 每 10 分钟自动: 抓取赔率 → 刷新情报 → 分析趋势 → 生成报告 → 发布网页

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: odds-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 运行赔率监控
        run: python main.py
        timeout-minutes: 5

      - name: 提交数据快照
        if: success()
        run: |
          git config user.name "Odds Monitor Bot"
          git config user.email "bot@odds.monitor"
          git add data/snapshots/ data/match_intel.json data/intel_history/
          if git diff --staged --quiet; then
            echo "数据无变化，跳过提交"
          else
            git commit -m "自动更新: 赔率快照 [$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')]"
            git pull --rebase origin main || true
            git push origin main
            echo "数据已提交并推送"
          fi

      - name: 发布到 GitHub Pages
        if: success()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "自动发布网页 [skip ci]"
